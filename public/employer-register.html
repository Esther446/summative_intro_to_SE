<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <main class="max-w-lg mx-auto py-12 px-4">
    <div class="bg-white rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold mb-5">Employer Registration</h1>
      <form id="employerRegisterForm" class="space-y-4">
        <input id="companyName" class="w-full border rounded px-3 py-2" placeholder="Company Name" required />
        <input id="email" type="email" class="w-full border rounded px-3 py-2" placeholder="Email" required />
        <input id="password" type="password" class="w-full border rounded px-3 py-2" placeholder="Password (min 6 chars)" required />
        <button class="w-full bg-emerald-600 text-white rounded px-4 py-2 hover:bg-emerald-700">Register</button>
      </form>
      <p id="message" class="text-sm mt-4"></p>
      <a href="/login.html" class="text-blue-600 text-sm">Already have an account? Login</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("employerRegisterForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.textContent = "";

      const payload = {
        companyName: document.getElementById("companyName").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      };

      try {
        const res = await fetch("/api/employers/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Registration failed");

        localStorage.setItem("token", data.token);
        localStorage.setItem("role", "employer");
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/employer-dashboard.html";
      } catch (err) {
        message.textContent = err.message;
        message.className = "text-red-600 text-sm mt-4";
      }
    });
  </script>
</body>
</html>
