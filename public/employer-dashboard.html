<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <main class="max-w-4xl mx-auto py-8 px-4">
    <div class="bg-white rounded-xl shadow p-6 mb-4 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">Employer Dashboard</h1>
        <p id="welcome" class="text-slate-600"></p>
      </div>
      <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</button>
    </div>

    <div class="bg-white rounded-xl shadow p-6 flex gap-3">
      <a href="/post-opportunity.html" class="inline-block bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">Post Opportunity</a>
      <a href="/internships.html" class="inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Manage Listings</a>
    </div>
  </main>

  <script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    if (!token || role !== "employer") {
      window.location.href = "/login.html";
    }

    document.getElementById("welcome").textContent = `Welcome, ${user.companyName || "Employer"} (${user.email || ""})`;
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "/login.html";
    });
  </script>
</body>
</html>
