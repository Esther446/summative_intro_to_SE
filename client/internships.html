<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internships</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 transition duration-300 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
      <h1 class="text-3xl font-bold">Available Internships</h1>

      <div class="flex gap-3">
        <a href="/post.html" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition hidden sm:inline-block" id="postLink">
          Post
        </a>

        <button onclick="toggleDark()" class="px-3 py-2 rounded-lg border hover:scale-105 transition">
          🌙
        </button>

        <button id="logoutBtn" class="px-3 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition hidden">
          Logout
        </button>
      </div>
    </div>

    <div id="message" class="mb-4 text-sm"></div>
    <div id="internships" class="grid md:grid-cols-2 gap-6"></div>
  </div>

  <script src="/js/auth-storage.js"></script>
  <script src="/js/internships.js"></script>
</body>
</html>
