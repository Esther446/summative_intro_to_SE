<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
  <button onclick="toggleDark()" class="absolute top-6 right-6 px-3 py-2 rounded-lg border hover:scale-105 transition">
    🌙
  </button>
<form id="studentForm" class="bg-white p-8 rounded-xl shadow space-y-4 w-96">
<h2 class="text-xl font-bold">Student Register</h2>
<input class="w-full border p-2" placeholder="Name" id="name">
<input class="w-full border p-2" placeholder="Email" id="email">
<input type="password" class="w-full border p-2" placeholder="Password" id="password">
<button type="submit" class="bg-indigo-600 text-white w-full py-2 rounded hover:bg-indigo-700 transition">Register</button>
</form>

<script>
function toggleDark(){
  document.body.classList.toggle("bg-gray-900");
  document.body.classList.toggle("text-white");
}

document.getElementById('studentForm').addEventListener('submit', async e => {
  e.preventDefault();

  const nameEl = document.getElementById('name');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');

  try {
    const res = await fetch('http://localhost:5000/api/students/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: nameEl.value.trim(),
        email: emailEl.value.trim(),
        password: passwordEl.value,
        skills: [],
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Registration failed');

    localStorage.setItem('token', data.token);
    localStorage.setItem('role', 'student');
    window.location = 'student-dashboard.html';
  } catch (err) {
    alert(err.message);
  }
});
</script>
</body>
</html>
