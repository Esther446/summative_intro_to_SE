<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">
<h1 class="text-3xl font-bold">Employer Dashboard</h1>
<p class="text-gray-600">Post and manage internships.</p>
<a href="post.html" class="text-indigo-600 underline">Post Internship</a>

<form id="postInternshipForm" class="bg-white border rounded-xl p-4 mt-6 space-y-3 max-w-2xl">
  <input id="title" class="w-full border rounded px-3 py-2" placeholder="Title" required>
  <textarea id="description" class="w-full border rounded px-3 py-2" placeholder="Description" required></textarea>
  <input id="location" class="w-full border rounded px-3 py-2" placeholder="Location" required>
  <input id="requiredSkills" class="w-full border rounded px-3 py-2" placeholder="Required skills (comma separated)">
  <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Post Internship</button>
</form>

<p id="employerMessage" class="mt-3 text-sm"></p>

<section class="mt-8">
  <h2 class="text-xl font-semibold mb-3">Your Posted Internships</h2>
  <div id="employerInternships" class="grid md:grid-cols-2 gap-4"></div>
</section>

<script src="/js/auth-storage.js"></script>
<script src="/js/employer-dashboard.js"></script>
</body>
</html>
