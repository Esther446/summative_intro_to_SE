<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
  <button onclick="toggleDark()" class="absolute top-6 right-6 px-3 py-2 rounded-lg border hover:scale-105 transition">
    🌙
  </button>
<form id="employerForm" class="bg-white p-8 rounded-xl shadow space-y-4 w-96">
<h2 class="text-xl font-bold">Employer Register</h2>
<input class="w-full border p-2" placeholder="Company Name" id="company">
<input class="w-full border p-2" placeholder="Email" id="email">
<input type="password" class="w-full border p-2" placeholder="Password" id="password">
<button type="submit" class="bg-indigo-600 text-white w-full py-2 rounded hover:bg-indigo-700 transition">Register</button>
</form>

<script src="/js/auth-storage.js"></script>
<script src="/js/employer-auth.js"></script>
</body>
</html>
