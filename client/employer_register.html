<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
<form id="employerForm" class="bg-white p-8 rounded-xl shadow space-y-4 w-96">
<h2 class="text-xl font-bold">Employer Register</h2>
<input class="w-full border p-2" placeholder="Company Name" id="company">
<input class="w-full border p-2" placeholder="Email" id="email">
<input type="password" class="w-full border p-2" placeholder="Password" id="password">
<button type="submit" class="bg-indigo-600 text-white w-full py-2 rounded">Register</button>
</form>

<script>
document.getElementById('employerForm').addEventListener('submit', async e =>{
 e.preventDefault();
 const res = await fetch('http://localhost:5000/api/employers/register',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({companyName:company.value,email:email.value,password:password.value})
 });
 const data = await res.json();
 localStorage.setItem('token',data.token);
 window.location='employer-dashboard.html';
});
</script>
</body>
</html>
